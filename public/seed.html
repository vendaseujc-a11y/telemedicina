<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed Médicos - Telemedicina Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
    <h1 class="text-2xl font-bold text-center mb-6">seed Médecos</h1>
    
    <div id="result" class="hidden mb-4 p-4 rounded-lg"></div>
    
    <button onclick="seedDoctors()" class="w-full bg-sky-500 text-white py-3 rounded-lg hover:bg-sky-600 font-medium">
      Inserir Médicos
    </button>
    
    <button onclick="getDoctors()" class="w-full bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 font-medium mt-3">
      Ver Médicos
    </button>
    
    <div id="doctorsList" class="mt-6"></div>
  </div>

  <script>
    const supabaseUrl = 'https://hosvbcrkitzhkxgoymes.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhvc3ZiY3JraXR6aGt4Z295bWVzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODAxOTM4OSwiZXhwIjoyMDkzNTk1Mzg5fQ.0pKb0OyQ2PHNg0Wn9SRwKHFv8WIDpnxI1sitn2uyQ8w';

    const doctors = [
      { name: 'Dr. Carlos Santos', role: 'medico', specialty: 'cardiologia', bio: 'Cardiologista com 15 anos', crm: 'CRM-SP 123456' },
      { name: 'Dra. Ana Silva', role: 'medico', specialty: 'dermatologia', bio: 'Dermatologista especializada', crm: 'CRM-SP 234567' },
      { name: 'Dr. Roberto Alves', role: 'medico', specialty: 'psicologia', bio: 'Psicólogo clínico', crm: 'CRP-SP 45678' },
      { name: 'Dra. Fernanda Costa', role: 'medico', specialty: 'pediatria', bio: 'Pediatra experiente', crm: 'CRM-SP 345678' },
      { name: 'Dr. Marcelo Oliveira', role: 'medico', specialty: 'clinico_geral', bio: 'Clínico Geral', crm: 'CRM-SP 567890' }
    ];

    async function seedDoctors() {
      const resultDiv = document.getElementById('result');
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<p class="text-blue-600">Inserindo médicos...</p>';
      
      let successes = 0;
      let errors = [];
      
      for (const doctor of doctors) {
        const response = await fetch(`${supabaseUrl}/rest/v1/profiles`, {
          method: 'POST',
          headers: {
            'apikey': supabaseKey,
            'Authorization': `Bearer ${supabaseKey}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(doctor)
        });
        
        if (response.ok) {
          successes++;
        } else {
          const error = await response.text();
          errors.push(`${doctor.name}: ${error}`);
        }
      }
      
      if (errors.length === 0) {
        resultDiv.className = 'mb-4 p-4 rounded-lg bg-green-100 text-green-700';
        resultDiv.innerHTML = `<p>${successes} médicos inseridos com sucesso!</p>`;
      } else {
        resultDiv.className = 'mb-4 p-4 rounded-lg bg-red-100 text-red-700';
        resultDiv.innerHTML = `<p>${successes} inseridos, ${errors.length} erros:</p><pre class="text-xs mt-2">${errors.join('\n')}</pre>`;
      }
    }

    async function getDoctors() {
      const listDiv = document.getElementById('doctorsList');
      listDiv.innerHTML = '<p class="text-gray-500">Carregando...</p>';
      
      const response = await fetch(`${supabaseUrl}/rest/v1/profiles?role=eq.medico`, {
        headers: {
          'apikey': supabaseKey,
          'Authorization': `Bearer ${supabaseKey}`
        }
      });
      
      const doctors = await response.json();
      
      if (doctors.length === 0) {
        listDiv.innerHTML = '<p class="text-gray-500">Nenhum médico encontrado.</p>';
        return;
      }
      
      listDiv.innerHTML = '<h3 class="font-bold mb-2">Médicos cadastrados:</h3>' + 
        doctors.map(d => `<div class="bg-gray-50 p-3 rounded mb-2"><strong>${d.name}</strong><br><span class="text-sm text-gray-600">${d.specialty}</span></div>`).join('');
    }
  </script>
</body>
</html>
